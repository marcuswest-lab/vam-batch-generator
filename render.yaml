services:
  - type: web
    name: bad-batch-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PORT
        value: 8090
      - key: SHEET_CREATIVE_TRACKING_ID
        sync: false
      - key: SHEET_META_DASHBOARD_ID
        sync: false
